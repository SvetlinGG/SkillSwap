
  <body>
    <div class="login-form">
       <div class="text">
          REGISTER
       </div>
       <form [formGroup]="registerForm" (ngSubmit)="register()">
        <div class="field">
          <div class="fas fa-envelope"></div>
          <input 
            type="text" 
            placeholder="Name" 
            formControlName="name" 
            />
       </div>
          <div class="field">
             <div class="fas fa-envelope"></div>
             <input 
               id="email"
               type="email"   
               placeholder="enter your email" 
               formControlName="email" 
               name="email" 
               />
          </div>
          <div class="field">
             <div class="fas fa-lock"></div>
             <input 
               id="password"
               type="password" 
               placeholder="enter password" 
               formControlName="password" 
               name="password">
          </div>
          <div class="field">
            <div class="fas fa-lock"></div>
            <input 
               type="password" 
               placeholder="re-password" 
               formControlName="password" 
               name="password" 
               />

               @if (password?.touched && password?.errors?.['required']) {
                 <p class="error">Password is required.</p>
               }
               @if (password?.touched && password?.errors?.['minlength']) {
                 <p class="error">Password must be at least 6 characters long.</p>
               }
         </div>

         @if (errorMessage()) {
           <p class="server-error">{{ errorMessage() }}</p>
         }
         
          <button type="submit" [disabled]="registerForm.invalid || isSubmitting()">
            {{ isSubmitting() ? 'Creating account...' : 'Register' }}
          </button>
          <div class="link">
            Already have an account?
             <a routerLink="/login">Login</a>
          </div>
       </form>
    </div>
 </body>
