<h2>Skills</h2>

<div class="skills-grid">
  <div class="skill-card">
    @for (skill of skills; track $index) {
    <h3>{{ skill.title }}</h3>
    <p>{{ skill.category }}</p>
    <a [routerLink]="['/skills', skill._id]">View Details</a>
    }
  </div>
</div>

<a routerLink="/skills/create" class="btn">Add Skill</a>
