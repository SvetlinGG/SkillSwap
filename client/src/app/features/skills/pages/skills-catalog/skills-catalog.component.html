<section class="catalog">
  <h2>Skills Catalog</h2>

  <a routerLink="/skills/create" class="create-btn">Create Skill</a>

  @if (skills.length > 0) {
    <div class="skills-grid">
      @for (skill of skills; track $index) {
        <article class="skill-card">
          <h3>{{ skill.title }}</h3>
          <p>{{ skill.category }}</p>
          <p>{{ skill.level }}</p>
          <a [routerLink]="['/skills', skill._id]">Details</a>
        </article>
      }
    </div>
  } @else {
    <p>No skills yet.</p>
  }
</section>
