<header class="header">
  <div class="logo">
    <a routerLink="/">SkillSwap</a>
  </div>

  <nav>
    <a routerLink="/">Home</a>
    <a routerLink="/skills">Catalog</a>

    @if (isLoggedIn()) {
      <a routerLink="/dashboard">Dashboard</a>
      <a routerLink="/my-skills">My Skills</a>
      <a (click)="logout()" style="cursor:pointer">Logout</a>
    } @else {
      <a routerLink="/login">Login</a>
      <a routerLink="/register">Register</a>
    }
  </nav>
</header>
